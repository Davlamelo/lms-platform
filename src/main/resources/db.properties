# ===========================================
# Configuration Base de données MySQL
# ===========================================

db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/lms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
db.username=root
db.password=root
db.schema=lms_db

# ===========================================
# Configuration HikariCP (pool connexions)
# ===========================================

hikari.maximumPoolSize=10
hikari.minimumIdle=2
hikari.idleTimeout=30000
hikari.connectionTimeout=30000
hikari.maxLifetime=1800000
hikari.poolName=LMS-HikariPool